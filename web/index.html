<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>oxGBC</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16.png" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="./css/gameboy.css" />
  <!-- VT323 loaded non-render-blocking; monospace fallback if it can't be fetched -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=VT323"
        media="print" onload="this.media='all'" />
  <a href="https://github.com/mxmgorin/oxgbc" class="github-corner" aria-label="View source on GitHub">
    <svg width="80" height="80" viewBox="0 0 250 250" style="fill:#fff; color:#151513; position:absolute; top:0; border:0; right:0;" aria-hidden="true">
      <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
      <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px" class="octo-arm"></path>
      <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
    </svg>
  </a>
</head>
<body>
  <div class="page">
    <p class="subtitle">
      <span class="brand">oxGBC</span> — Game Boy / Game Boy Color in your browser, powered by Rust and WASM
      <br />
      <span class="credit">PROGRAMMED BY MXMGORIN</span>
    </p>

    <div class="device" data-theme="teal">
      <div class="inputs">
        <div class="input-group">
          <label for="roms">ROM:</label>
          <select id="roms">
            <option value="tobudx">Tobu Tobu Girl DX</option>
          </select>
        </div>
        <button id="pause" class="bezel-btn" aria-label="Pause">❚❚</button>
        <div class="input-group">
          <input type="file" id="romInput" accept=".gb,.gbc" hidden />
          <label for="romInput" class="file-btn bezel-btn">FILE</label>
          <span id="fileName" class="file-name">demo</span>
        </div>
      </div>

      <div class="screen-frame">
        <div class="screen">
          <canvas id="screen" width="160" height="144"></canvas>
          <div id="pause-overlay">PAUSED</div>
          <div id="loader" class="bar-loader">
            <div class="label">Loading…</div>
            <div class="bar"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          </div>
        </div>
        <div class="brand"><span class="c-o">o</span><span class="c-x">x</span><span class="c-g">G</span><span class="c-b">B</span><span class="c-c">C</span></div>
      </div>

      <div class="inputs">
        <button id="audio" class="sound off">Sound ✕</button>
        <div class="themes" aria-label="Shell color">
          <button class="swatch" data-theme="grape"     style="background:#8a5fc4" title="Grape"></button>
          <button class="swatch" data-theme="teal"      style="background:#3fc0cf" title="Teal"></button>
          <button class="swatch" data-theme="berry"     style="background:#d24b86" title="Berry"></button>
          <button class="swatch" data-theme="dandelion" style="background:#f2cf4c" title="Dandelion"></button>
          <button class="swatch" data-theme="kiwi"      style="background:#8fc73f" title="Kiwi"></button>
          <button class="swatch" data-theme="atomic"    style="background:#b7b1d8" title="Atomic"></button>
        </div>
        <div class="scale-control">
          <label>Scale:</label>
          <button id="scaleMinus" class="bezel-btn">−</button>
          <input id="scaleInput" class="bezel-input" value="3" readonly />
          <button id="scalePlus" class="bezel-btn">+</button>
        </div>
      </div>

      <div class="gb-controls">
        <div class="dpad">
          <button class="up"    data-btn="up"    aria-label="Up"></button>
          <button class="left"  data-btn="left"  aria-label="Left"></button>
          <button class="mid" disabled></button>
          <button class="right" data-btn="right" aria-label="Right"></button>
          <button class="down"  data-btn="down"  aria-label="Down"></button>
        </div>
        <div class="ab">
          <div class="ab-wrap">
            <button class="btn-round btn-b" data-btn="b" aria-label="B"></button>
            <span class="lbl">B</span>
          </div>
          <div class="ab-wrap">
            <button class="btn-round btn-a" data-btn="a" aria-label="A"></button>
            <span class="lbl">A</span>
          </div>
        </div>
      </div>

      <div class="startselect">
        <div class="pill-wrap"><button class="pill" data-btn="select" aria-label="Select"></button><span class="lbl">SELECT</span></div>
        <div class="pill-wrap"><button class="pill" data-btn="start" aria-label="Start"></button><span class="lbl">START</span></div>
      </div>

      <div class="speaker"></div>
    </div>

    <div class="hint">
      Keyboard: <kbd>↑↓←→</kbd> · A <kbd>X</kbd> · B <kbd>Z</kbd> ·
      Start <kbd>Enter</kbd> · Select <kbd>Backspace</kbd> — or tap the buttons
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
