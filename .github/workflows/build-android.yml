name: Android

on:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      APK_PATH: android/app/build/outputs/apk/debug/oxgbc-android-universal.apk
      APK_BUILD_PATH: android/app/build/outputs/apk/debug/app-debug.apk
      APK_NAME: oxgbc-android-universal.apk

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # Caches the pinned SDL2 source clone and the per-ABI libSDL2.so outputs so
      # build.sh skips the slow cmake builds on subsequent runs.
      - name: Cache Android SDL2
        uses: actions/cache@v4
        with:
          path: |
            android/SDL2
            android/app/src/main/jniLibs
          key: android-sdl2-${{ hashFiles('android/build.sh') }}-v1

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk: 26.3.11579264
          cmake: 3.22.1

      - name: Install NDK 26.3.11579264
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264"

      - name: Verify NDK installation
        run: ls $ANDROID_HOME/ndk

      - name: Build Rust libraries
        working-directory: ./android
        run: |
          export ANDROID_NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
          echo "Using NDK at $ANDROID_NDK_HOME"
          ./build.sh

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv "$APK_BUILD_PATH" "$APK_PATH"

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
