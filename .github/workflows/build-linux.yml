name: Linux x86_64

on:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y libsdl2-dev zip

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v2"
        run: cargo build --release -p desktop

      - name: Prepare Linux release files
        run: |
          mkdir -p dist
          cp target/release/oxgbc dist/

      - name: Zip Linux release
        run: cd dist && zip -r oxgbc-linux-x86_64.zip .

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: oxgbc-linux-x86_64.zip
          path: dist/oxgbc-linux-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload Linux zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/oxgbc-linux-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
