name: Windows

on:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache vcpkg SDL2
      id: cache-sdl2
      uses: actions/cache@v4
      with:
        path: C:\vcpkg\installed
        key: vcpkg-sdl2-${{ runner.os }}-v1

    # Only SDL2 is linked (no image/mixer/ttf). Skipped entirely on cache hit.
    - name: Install SDL2 (via vcpkg)
      if: steps.cache-sdl2.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        C:\vcpkg\vcpkg.exe install sdl2

    - name: Set SDL2 env vars
      run: |
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
        echo "RUSTFLAGS=-L C:\vcpkg\installed\x64-windows\lib" >> $env:GITHUB_ENV
      shell: powershell

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2

    - name: Build release
      run: cargo build --release -p desktop

    - name: Prepare release folder
      run: |
        mkdir dist
        copy target\release\oxgbc.exe dist\
        copy C:\vcpkg\installed\x64-windows\bin\SDL2.dll dist\

    - name: Zip release folder
      run: |
        powershell Compress-Archive -Path dist\* -DestinationPath oxgbc-windows-x86_64.zip


    - name: Upload artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: oxgbc-windows-x86_64.zip
        path: oxgbc-windows-x86_64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN }}

    - name: Upload zip to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: oxgbc-windows-x86_64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN }}
