name: MacOS
on:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build universal binary
        env:
          CMAKE_POLICY_VERSION_MINIMUM: 3.5
        run: |
          cargo build --release --target=aarch64-apple-darwin -p desktop
          cargo build --release --target=x86_64-apple-darwin -p desktop
          mkdir -p target/universal/release
          lipo -create -output target/universal/release/oxgbc \
            target/aarch64-apple-darwin/release/oxgbc \
            target/x86_64-apple-darwin/release/oxgbc

      - name: Prepare macOS release files
        run: |
          mkdir -p dist
          cp target/universal/release/oxgbc dist/

      - name: Zip bundle
        run: cd dist && zip -r oxgbc-macos-universal.zip .

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: oxgbc-macos-universal.zip
          path: dist/oxgbc-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload Linux zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/oxgbc-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
